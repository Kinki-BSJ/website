            <h2>沿革</h2>
            <section>
                <p>近畿植物学会は、日本植物学会と共同して、植物学の進歩に寄与するための諸活動を行い、併せて会員相互の研究交流と親睦を図ることを目的とし、日本植物学会近畿支部を母体に2011年12月に設立されました。</p>
